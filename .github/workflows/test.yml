name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - name: Stage lib from src (package.json main points to lib/)
        run: mkdir -p lib && cp -r src/* lib/
      - run: npm test --if-present -- --passWithNoTests
      - run: node test-package.js
